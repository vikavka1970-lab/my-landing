<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="google" content="notranslate">
<meta http-equiv="Content-Language" content="ru">
<title>404 — Страница не найдена · Виктория Полтавченко</title>

<link rel="icon" type="image/svg+xml" href="images/favicon.svg">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&family=Syne+Mono&display=swap" rel="stylesheet">
<style>

/* ─── RESET & BASE ─────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #0F172A;
  --surface:  #1E293B;
  --border:   #334155;
  --accent:   #6366F1;
  --cyan:     #06B6D4;
  --text:     #F1F5F9;
  --muted:    #94A3B8;
  --radius:   16px;
  --font-h:   'Syne', sans-serif;
  --font-b:   'DM Sans', sans-serif;
  --font-m:   'Syne Mono', monospace;
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-b);
  font-size: 16px;
  line-height: 1.65;
  overflow-x: hidden;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ─── GRAIN TEXTURE ─────────────────────────────────────── */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 9998;
  pointer-events: none;
  opacity: 0.035;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  background-size: 200px 200px;
  background-repeat: repeat;
}

/* ─── CURSOR ────────────────────────────────────────────── */
.cursor-dot, .cursor-ring {
  position: fixed; top: 0; left: 0;
  pointer-events: none; z-index: 9999;
  transform: translate(-50%, -50%);
  transition: opacity 0.3s;
}
.cursor-dot  { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; }
.cursor-ring { width: 32px; height: 32px; border: 1.5px solid rgba(99,102,241,0.5); border-radius: 50%; transition: width 0.2s, height 0.2s, transform 0.08s; }
@media (pointer: coarse) { .cursor-dot, .cursor-ring { display: none; } }

/* ─── BUTTONS ───────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 14px 28px; border-radius: 12px;
  font-family: var(--font-h); font-size: 15px; font-weight: 600;
  cursor: pointer; text-decoration: none;
  transition: all 0.25s ease; border: none; white-space: nowrap;
}
.btn-primary {
  background: linear-gradient(135deg, var(--accent), #4f46e5);
  background-size: 200% 200%;
  color: #fff; position: relative; overflow: hidden;
  box-shadow: 0 4px 20px rgba(99,102,241,0.3);
}
.btn-primary::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, #818cf8, var(--accent));
  opacity: 0; transition: opacity 0.3s;
}
.btn-primary:hover::after { opacity: 1; }
.btn-primary:hover {
  box-shadow: 0 0 32px rgba(99,102,241,0.6), 0 0 64px rgba(99,102,241,0.25);
  transform: translateY(-2px) scale(1.02);
}
.btn-primary:active { transform: translateY(0) scale(0.98); }
.btn-primary span, .btn-primary svg { position: relative; z-index: 1; }

/* ─── 404 PAGE ──────────────────────────────────────────── */
.page-404 {
  text-align: center;
  padding: 40px 24px;
  position: relative;
}

.orb {
  position: fixed; border-radius: 50%;
  filter: blur(80px); pointer-events: none; z-index: 0;
}
.orb-1 {
  width: 500px; height: 500px; top: -150px; left: -150px;
  background: radial-gradient(circle, rgba(99,102,241,0.12) 0%, transparent 70%);
}
.orb-2 {
  width: 400px; height: 400px; bottom: -100px; right: -100px;
  background: radial-gradient(circle, rgba(6,182,212,0.1) 0%, transparent 70%);
}

.code-404 {
  font-family: var(--font-h);
  font-size: clamp(100px, 20vw, 180px);
  font-weight: 800;
  line-height: 1;
  background: linear-gradient(135deg, var(--accent) 0%, var(--cyan) 50%, #a78bfa 100%);
  background-size: 200% 200%;
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: gradientFlow 5s ease infinite;
  position: relative; z-index: 1;
}
@keyframes gradientFlow {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.label-404 {
  font-family: var(--font-m);
  font-size: 12px; font-weight: 600;
  letter-spacing: 0.15em; text-transform: uppercase;
  color: var(--cyan);
  margin-bottom: 16px;
  position: relative; z-index: 1;
}

.title-404 {
  font-family: var(--font-h);
  font-size: clamp(22px, 4vw, 32px);
  font-weight: 700;
  color: var(--text);
  margin-bottom: 16px;
  position: relative; z-index: 1;
}

.desc-404 {
  color: var(--muted);
  font-size: 16px;
  max-width: 400px;
  margin: 0 auto 40px;
  position: relative; z-index: 1;
}

.actions-404 {
  display: flex; gap: 16px; justify-content: center; flex-wrap: wrap;
  position: relative; z-index: 1;
}

</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="cursor-dot" id="cursorDot"></div>
<div class="cursor-ring" id="cursorRing"></div>

<div class="page-404">
  <p class="label-404">Ошибка</p>
  <div class="code-404">404</div>
  <h1 class="title-404">Страница не найдена</h1>
  <p class="desc-404">Кажется, такой страницы не существует. Возможно, ссылка устарела или в адресе опечатка.</p>
  <div class="actions-404">
    <a href="index.html" class="btn btn-primary">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      <span>На главную</span>
    </a>
  </div>
</div>

<script>
const dot  = document.getElementById('cursorDot');
const ring = document.getElementById('cursorRing');
if (dot && ring) {
  let mx = 0, my = 0, rx = 0, ry = 0;
  document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
  (function animate() {
    rx += (mx - rx) * 0.12;
    ry += (my - ry) * 0.12;
    dot.style.left  = mx + 'px'; dot.style.top  = my + 'px';
    ring.style.left = rx + 'px'; ring.style.top = ry + 'px';
    requestAnimationFrame(animate);
  })();
  document.addEventListener('mousedown', () => { ring.style.width = '24px'; ring.style.height = '24px'; });
  document.addEventListener('mouseup',   () => { ring.style.width = '32px'; ring.style.height = '32px'; });
}
</script>
</body>
</html>
