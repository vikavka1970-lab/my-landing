<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; }
  body {
    width: 640px; height: 360px; overflow: hidden;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 16px;
  }
  .circle {
    width: 120px; height: 120px; border-radius: 50%;
    background: linear-gradient(135deg, #6366f1, #2aabee);
    display: flex; align-items: center; justify-content: center;
    font-family: -apple-system, Arial, sans-serif;
    font-size: 42px; font-weight: 700; color: #fff;
    letter-spacing: -2px;
    box-shadow: 0 12px 40px rgba(42,171,238,0.5);
  }
  .name {
    font-family: -apple-system, Arial, sans-serif;
    font-size: 22px; font-weight: 600; color: #fff;
    letter-spacing: 1px;
  }
  .sub {
    font-family: -apple-system, Arial, sans-serif;
    font-size: 14px; color: rgba(255,255,255,0.5);
    letter-spacing: 2px; text-transform: uppercase;
  }
</style>
</head>
<body>
  <div class="circle">ВП</div>
  <div class="name">Виктория Полтавченко</div>
  <div class="sub">Сайты · Приложения · AI</div>
</body>
</html>
